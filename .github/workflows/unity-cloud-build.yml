name: 🔥 灵绘 APK 云编译

on:
  push:
    branches: [master]
    paths:
      - 'ai-desktop-pet/unity_project/**'
      - 'ai-desktop-pet/unity/**'
      - '.github/workflows/unity-cloud-build.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: 📱 编译 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🗑️ 清理缓存
        run: find ai-desktop-pet -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: 📦 缓存 Unity Library
        uses: actions/cache@v4
        with:
          path: ai-desktop-pet/unity_project/Library
          key: Library-Android-${{ hashFiles('ai-desktop-pet/unity_project/Assets/**', 'ai-desktop-pet/unity_project/Packages/**', 'ai-desktop-pet/unity_project/ProjectSettings/**') }}
          restore-keys: Library-Android-

      - name: 🎮 Unity 编译 APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: ai-desktop-pet/unity_project
          targetPlatform: Android
          buildName: LingHui-Nezha
          buildsPath: build
          versioning: Semantic
          androidAppBundle: false

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: LingHui-Nezha-APK
          path: build/Android/*.apk
          retention-days: 30

      - name: 📋 构建报告
        run: |
          APK=$(find build/Android -name "*.apk" 2>/dev/null | head -1)
          SIZE=$(du -h "$APK" 2>/dev/null | cut -f1)
          echo "### 🔥 灵绘 APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "**APK**: $APK ($SIZE)" >> $GITHUB_STEP_SUMMARY
          echo "📱 下载后直接安装到手机" >> $GITHUB_STEP_SUMMARY
