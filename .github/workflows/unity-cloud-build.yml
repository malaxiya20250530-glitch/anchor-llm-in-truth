name: 🔥 灵绘 APK 云编译

on:
  push:
    branches: [master]
    paths:
      - 'ai-desktop-pet/unity_project/**'
      - 'ai-desktop-pet/unity/**'
      - '.github/workflows/unity-cloud-build.yml'
  workflow_dispatch:

jobs:
  build-apk:
    name: 📱 编译 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🗑️ 清理
        run: find ai-desktop-pet -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: 📦 缓存 Library
        uses: actions/cache@v4
        with:
          path: ai-desktop-pet/unity_project/Library
          key: Library-Android-v2-${{ hashFiles('ai-desktop-pet/unity_project/Assets/**') }}
          restore-keys: Library-Android-v2-

      - name: 🔑 激活个人许可证
        uses: game-ci/unity-activate@v1
        with:
          unityVersion: 2022.3.20f1
          unityUsername: ${{ secrets.UNITY_EMAIL }}
          unityPassword: ${{ secrets.UNITY_PASSWORD }}
          unitySerial: ''
          unityPersonal: 'true'

      - name: 🎮 编译 APK
        uses: game-ci/unity-builder@v4
        with:
          projectPath: ai-desktop-pet/unity_project
          targetPlatform: Android
          buildName: LingHui-Nezha
          buildsPath: build
          versioning: Semantic
          androidAppBundle: false

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: LingHui-Nezha-APK
          path: build/Android/*.apk
          retention-days: 30

      - name: 📋 报告
        run: |
          APK=$(find build/Android -name "*.apk" 2>/dev/null | head -1)
          echo "### 🔥 灵绘 APK" >> $GITHUB_STEP_SUMMARY
          echo "**文件**: $APK" >> $GITHUB_STEP_SUMMARY
          echo "**大小**: $(du -h "$APK" 2>/dev/null | cut -f1)" >> $GITHUB_STEP_SUMMARY
