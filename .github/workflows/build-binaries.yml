name: 🔒 跨平台编译 Cython 二进制

on:
  push:
    branches: [master]
  workflow_dispatch:      # 手动触发
  release:
    types: [published]    # 发版时自动编译

jobs:
  # ========== Linux x86_64 ==========
  linux:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install cython
      - run: python3 build_binaries.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: "*.cpython-*-linux-gnu.so"

  # ========== macOS x86_64 ==========
  macos-x64:
    runs-on: macos-13
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install cython
      - run: python3 build_binaries.py
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: "*.cpython-*-darwin.so"

  # ========== macOS arm64 (Apple Silicon) ==========
  macos-arm:
    runs-on: macos-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install cython
      - run: python3 build_binaries.py
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: "*.cpython-*-darwin.so"

  # ========== Windows x86_64 ==========
  windows:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install cython
      - run: python build_binaries.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: "*.cpython-*.pyd"

  # ========== 合包发布 ==========
  release:
    if: github.event_name == 'release'
    needs: [linux, macos-x64, macos-arm, windows]
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - run: |
          cd dist
          for d in */; do
            zip -r "${d%/}.zip" "$d"
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
