<!DOCTYPE html><html><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>test</title>
<style>body{background:#0a0618;margin:0;color:#fff;font-family:sans-serif;padding:20px}</style></head>
<body>
<div id=log style="font-size:14px">测试中...</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function w(){
  if(typeof THREE==='undefined'){setTimeout(w,200);return;}
  var L=document.getElementById('log');
  L.innerHTML='Three.js ✅<br>';
  try{
    var s=new THREE.Scene();s.background=new THREE.Color(0x0a0618);
    L.innerHTML+='Scene ✅<br>';
    var c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,20);
    c.position.set(0,0,3);L.innerHTML+='Camera ✅<br>';
    var r=new THREE.WebGLRenderer({antialias:false,alpha:true});
    r.setSize(innerWidth,innerHeight);document.body.appendChild(r.domElement);
    L.innerHTML+='Renderer ✅<br>';
    s.add(new THREE.AmbientLight(0xffffff,2));
    s.add(new THREE.DirectionalLight(0xffffff,5)).position.set(0,1,3);
    var sphere=new THREE.Mesh(
      new THREE.SphereGeometry(0.3,24,24),
      new THREE.MeshStandardMaterial({color:0xff6644,roughness:0.3})
    );
    s.add(sphere);L.innerHTML+='球体 ✅<br>';
    function loop(t){
      requestAnimationFrame(loop);
      sphere.rotation.y+=0.01;sphere.position.y=Math.sin(t*0.003)*0.2;
      r.render(s,c);
    }
    requestAnimationFrame(loop);
    L.innerHTML+='全部OK! 🎉';
    setTimeout(function(){L.style.opacity=0},1500);
  }catch(e){L.innerHTML+='<br>❌ '+e.message}
})();
</script></body></html>
